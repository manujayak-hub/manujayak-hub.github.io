<body>

  <!-- CONTENT LOADS HERE -->

  <div id="main-content"></div>

  <!-- MAIN SCRIPT -->

  <script>

    const themes = [
      { primary:'#ff7a00', secondary:'#ff9d42', rgb:'255,122,0' },
      { primary:'#24d4ff', secondary:'#5ee7ff', rgb:'36,212,255' },
      { primary:'#20e070', secondary:'#6cf2a3', rgb:'32,224,112' },
      { primary:'#ff4f8b', secondary:'#ff86b0', rgb:'255,79,139' }
    ];

    function applyTheme(theme){
      const root = document.documentElement;
      const themeColor = document.querySelector('meta[name="theme-color"]');

      root.style.setProperty('--primary', theme.primary);
      root.style.setProperty('--primary-2', theme.secondary);
      root.style.setProperty('--primary-rgb', theme.rgb);

      if(themeColor){
        themeColor.setAttribute('content', theme.primary);
      }
    }

    function rotateTheme(){
      let index = Math.floor(Date.now() / 15000) % themes.length;
      applyTheme(themes[index]);

      setInterval(() => {
        index = (index + 1) % themes.length;
        applyTheme(themes[index]);
      }, 15000);
    }

    async function getSection(path){
      const res = await fetch(path);

      if(!res.ok){
        throw new Error(`Could not load ${path}`);
      }

      return res.text();
    }

    function revealHiddenElements(){
      const hiddenElements = document.querySelectorAll('.hidden:not(.observed)');

      const observer = new IntersectionObserver((entries) => {

        entries.forEach((entry) => {

          if(entry.isIntersecting){

            entry.target.classList.add('show');
            observer.unobserve(entry.target);
          }

        });

      });

      hiddenElements.forEach((el) => {
        el.classList.add('observed');
        observer.observe(el);
      });
    }

    // INITIALIZE WEBSITE

    async function initWebsite(){

      rotateTheme();

      const main = document.getElementById('main-content');
      const aboveFoldSections = [
        'sections/navbar.html',
        'sections/hero.html'
      ];
      const remainingSections = [
        'sections/about.html',
        'sections/skills.html',
        'sections/projects.html',
        'sections/testimonials.html',
        'sections/contact.html',
        'sections/footer.html'
      ];

      const aboveFoldHtml = await Promise.all(aboveFoldSections.map(getSection));
      main.insertAdjacentHTML('beforeend', aboveFoldHtml.join(''));
      revealHiddenElements();

      const remainingHtml = await Promise.all(remainingSections.map(getSection));
      main.insertAdjacentHTML('beforeend', remainingHtml.join(''));
      revealHiddenElements();

      // AUTO YEAR

      const year = document.getElementById("year");

      if(year){

        year.textContent = new Date().getFullYear();
      }

    }

    // START WEBSITE

    initWebsite();

  </script>
